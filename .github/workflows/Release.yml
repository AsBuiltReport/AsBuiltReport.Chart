name: Publish PowerShell Module

on:
  release:
    types: [published]

jobs:
  publish-to-psgallery:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore ./Sources
      - name: Build the library for MacOS
        run: dotnet publish ./Sources -c Release -r osx-x64
      - name: Copy the library for MacOS
        run: copy ./Sources/bin/Release/netstandard2.0/osx-x64/publish/*.dll ./AsBuiltReport.Charts/Src/Assemblies/Core/osx-x64
      - name: Build the library for Linux
        run: dotnet publish ./Sources -c Release -r linux-x64
      - name: Copy the library for Linux
        run: copy ./Sources/bin/Release/netstandard2.0/linux-x64/publish/*.dll ./AsBuiltReport.Charts/Src/Assemblies/Core/linux-x64
      - name: Build the library for Windows
        run: dotnet publish ./Sources -c Release -r win-x64
      - name: Copy the library for Windows
        run: copy ./Sources/bin/Release/netstandard2.0/win-x64/publish/*.dll ./AsBuiltReport.Charts/Src/Assemblies/Core/windows-x64
      - name: Run tests
        run: dotnet test --no-build --verbosity normal ./Sources
      - name: Set PSRepository to Trusted for PowerShell Gallery
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
      - name: Test Module Manifest
        shell: pwsh
        run: |
          Test-ModuleManifest .\AsBuiltReport.Charts\AsBuiltReport.Charts.psd1
      - name: Publish module to PowerShell Gallery
        shell: pwsh
        run: |
          Publish-Module -Path .\AsBuiltReport.Charts\ -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Verbose
